version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "rajbos"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
